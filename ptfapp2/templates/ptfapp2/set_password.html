{% extends 'base.html' %}
{% block content %}
<section style="max-width:420px;margin:100px auto;padding:40px;">

  <div class="section-eyebrow">
    <div class="eyebrow-line"></div>
    <span class="eyebrow-text">Account Setup</span>
  </div>

  <h2 class="section-h2" style="margin-bottom:8px;">
    Set your <span class="acc">password</span>
  </h2>
  <p style="color:var(--text-muted);font-size:13px;margin-bottom:32px;font-family:var(--mono);">
    You signed in with Google/Zoho. Set a password so you can also log in with email.
  </p>

  {% if messages %}
    {% for message in messages %}
    <div class="toast-nova toast-{{ message.tags }}" style="margin-bottom:16px;">
      {{ message }}
    </div>
    {% endfor %}
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div style="margin-bottom:16px;">
      <label style="font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:2px;display:block;margin-bottom:8px;">
        NEW PASSWORD
      </label>
      <input type="password" name="password1" required
        style="width:100%;background:var(--surface2);border:1px solid var(--border);
               border-radius:8px;padding:12px 16px;color:var(--text);
               font-family:var(--mono);font-size:13px;">
    </div>
    <div style="margin-bottom:24px;">
      <label style="font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:2px;display:block;margin-bottom:8px;">
        CONFIRM PASSWORD
      </label>
      <input type="password" name="password2" required
        style="width:100%;background:var(--surface2);border:1px solid var(--border);
               border-radius:8px;padding:12px 16px;color:var(--text);
               font-family:var(--mono);font-size:13px;">
    </div>
    <button type="submit" class="nav-cta" style="width:100%;text-align:center;padding:12px;">
      Set Password & Continue →
    </button>
  </form>

</section>
{% endblock %}
